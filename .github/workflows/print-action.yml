name: Print workflow
on: workflow_dispatch
jobs:
  print-greeting:
    runs-on: ubuntu-latest
    steps:
    - name: Print Greetings
      run: echo 'Hallo There!'
  print-goodbye:
    needs: print-greeting
    runs-on: ubuntu-latest
    steps:
    - name: Print Goodbye
      run: echo 'Good Bye!:)'
